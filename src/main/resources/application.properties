spring.application.name=ejerciciosupermercado

# Conexion PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/supermercado}
spring.datasource.username=${DB_USER_NAME:Support}
spring.datasource.password=${DB_PASSWORD:support}

# JPA
spring.jpa.hibernate.ddl-auto=update

# Ejecutar data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Mostrar SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true